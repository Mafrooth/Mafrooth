<!DOCTYPE html>
<html>
<head>
  <title>FriendChat</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b141a;
    }

    header {
      background: #202c33;
      color: white;
      padding: 15px;
      font-size: 18px;
    }

    #chat {
      height: 70vh;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
    }

    .msg {
      max-width: 60%;
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
      font-size: 14px;
    }

    .me {
      background: #005c4b;
      color: white;
      align-self: flex-end;
    }

    .other {
      background: #202c33;
      color: white;
      align-self: flex-start;
    }

    footer {
      display: flex;
      padding: 10px;
      background: #202c33;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: none;
      outline: none;
    }

    button {
      margin-left: 10px;
      padding: 10px 15px;
      border: none;
      background: #00a884;
      color: white;
      border-radius: 50%;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>💬 Friend Chat</header>

<div id="chat"></div>

<footer>
  <input id="msg" placeholder="Type a message">
  <button onclick="send()">➤</button>
</footer>

<script>
  const chatEl = document.getElementById('chat');
  const msgInput = document.getElementById('msg');
  let currentName = localStorage.getItem('friendChatName') || '';
  let messages = JSON.parse(localStorage.getItem('friendChatMessages') || '[]');

  function promptName() {
    const name = prompt('Enter your name for the chat:');
    if (name && name.trim()) {
      currentName = name.trim();
      localStorage.setItem('friendChatName', currentName);
    }
    if (!currentName) {
      alert('Please enter a name to chat.');
      promptName();
    }
  }

  function saveMessages() {
    localStorage.setItem('friendChatMessages', JSON.stringify(messages));
  }

  function formatMessage(message) {
    const div = document.createElement('div');
    div.classList.add('msg');
    div.classList.add(message.name === currentName ? 'me' : 'other');
    div.innerHTML = `<b>${escapeHtml(message.name)}</b><br>${escapeHtml(message.text)}`;
    return div;
  }

  function renderMessages() {
    chatEl.innerHTML = '';
    if (messages.length === 0) {
      const empty = document.createElement('div');
      empty.classList.add('status');
      empty.style.textAlign = 'center';
      empty.style.padding = '20px';
      empty.textContent = 'No messages yet. Say hello to your friends!';
      chatEl.appendChild(empty);
      return;
    }
    messages.forEach(message => chatEl.appendChild(formatMessage(message)));
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function send() {
    const text = msgInput.value.trim();
    if (!text) return;
    const message = { name: currentName, text };
    messages.push(message);
    saveMessages();
    chatEl.appendChild(formatMessage(message));
    msgInput.value = '';
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function escapeHtml(text) {
    return text.replace(/[&<>"']/g, char => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#039;'
    })[char]);
  }

  function loadInitialData() {
    if (messages.length > 0) {
      renderMessages();
      return;
    }

    fetch('data.json')
      .then(response => response.ok ? response.json() : Promise.reject('Load failed'))
      .then(data => {
        if (Array.isArray(data.messages)) {
          messages = data.messages;
          saveMessages();
        }
      })
      .catch(() => {
        console.warn('Could not load data.json. Starting empty chat.');
        messages = [];
        saveMessages();
      })
      .finally(renderMessages);
  }

  window.addEventListener('load', () => {
    if (!currentName) promptName();
    if (!currentName) return;
    loadInitialData();
  });

  msgInput.addEventListener('keypress', event => {
    if (event.key === 'Enter') {
      event.preventDefault();
      send();
    }
  });
</script>

</body>
</html>
